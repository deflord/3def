#--=================================================================================--#
######### Глобальные ##################################################################
#--=================================================================================--#
[gcode_macro _DEF_GLOBAL_VARS]
description: Глобальные переменные, используемые в нескольких макросах
gcode: # Оставить пустым

# Настройте это значение, чтобы оно соответствовало базовому
variable_stepper_name             : 'leg'     #
variable_travel_speed             : 350        # Переменная скорость перемещения, мм/с
variable_z_travel_speed           : 100         # Переменная скорость вертикального перемещения, мм/с
variable_verbose                  : 2          # Вывод в консоль для макросов
variable_accel                    : 2000        # Ускорение для всех движений в макросах
                                               #  0 - Отключено
                                               #  1 - Ограниченное
                                               #  2 - Полное
# Высота Z для парковки, мм
variable_park_z                   : 2

# Высота Z-Hop перед перемещением по X и Y       
variable_z_hop                    : 0.4        


#--=================================================================================--#
######### Очистка переходных цветов (Poop) ##############################################################
#--=================================================================================--#
[gcode_macro _DEF_POOP_VARS]
description: Настройки переменных для макроса очистки
gcode: # Оставить пустым

# (x,y) Координаты точки очистки
variable_purge_loc_xy             : 490, 490

# Скорость очистки, в мм/с
variable_purge_spd                : 6.5

# Скорость подъема Z после очистки, в мм/с. Быстрый подъем предотвращает прилипание к соплу.
variable_fast_z                   :  200

# Высота подъема Z после завершения очистки
variable_z_lift                   : 20

# Возвращать ли сопло в начальную позицию после очистки.
variable_restore_position          : False        # True = вернуться в начальную позицию, False = не возвращаться

# Высота, на которую нужно поднять сопло перед очисткой. Это позволяет освободить накопившееся давление перед очисткой.
variable_purge_start              : 0.6

# Установите скорость работы охлаждающего вентилятора деталей. Отключение может помочь предотвратить охлаждение сопла и стимулировать поток, а включение может предотвратить склеивание пластин.
variable_part_cooling_fan         : True        # Работает на полной скорости
variable_part_cooling_fan_speed   : 1.0         # Скорость работы вентилятора при включении. Значение от 0 до 1.0

# Пауза после очистки для охлаждения с помощью вентилятора
variable_purge_cool_time          : 2           # Время в секундах

# ==================== Настройка длины очистки

# Длина очистки по умолчанию, используемая, если не установлены параметры purge_volumes в карте инструментов или параметр PURGE_LENGTH.
variable_purge_length             : 72.111

# Минимальная абсолютная длина очистки, даже если инструмент не меняется. Это необходимо для предварительного нагрева сопла перед печатью.
variable_purge_length_minimum     : 60.999

# Обычно срезаются некоторые значения срезки. Настройте это значение для достижения оптимального результата. Начните с 0.6.
# variable_purge_length_modifier    : 1

# Дополнительная длина материала, добавляемая после объема очистки. Объем очистки не всегда учитывает работу режущего устройства, поэтому обмен красного на белый может быть достаточно длинным, но обмен белого на красный может быть слишком коротким. Когда изменять это значение:
#   Увеличьте: Если обмен темного на светлый хорош, но обмен светлого на темный плохой.
#   Уменьшите: Если обмен светлого на темный хорош, но обмен темного на светлый плохой. Не забудьте также увеличить purge_length_modifier.
# variable_purge_length_addition    : 0


#--=================================================================================--#
######### Макрос "Толчок" (Kick) ########################################################################
#--=================================================================================--#
[gcode_macro _DEF_KICK_VARS]
description: Настройки переменных для макроса толчка
gcode: # Оставить пустым

# Начальная позиция перед толчком по осям X, Y, Z
variable_kick_start_loc           : 470, 490, 10

# Высота опускания сопла во время толчка
variable_kick_z                   : 3.5 

# Скорость движения при толчке
variable_kick_speed               : 300 

# Направление толчка (влево, вправо, вперед, назад) (left, right, front, back)
variable_kick_direction           : "right"

# Ускорение движения при толчке. Это значение переопределит глобальное ускорение для данного макроса. Установите 0, чтобы использовать глобальное ускорение.
variable_kick_accel               : 0

# Расстояние, на которое выполняется толчок
variable_kick_move_dist           : 20 

# Высота Z после выполнения толчка
variable_z_after_kick             : 10 


#--=================================================================================--#
######### Макрос "Щетка" (Brush) ########################################################################
#--=================================================================================--#
[gcode_macro _DEF_BRUSH_VARS]
description: Настройки переменных для макроса щетки
gcode: # Оставить пустым

# Центральная позиция щетки (установите Z в -1, если не требуется движение по Z)
variable_brush_loc                : 430, 505, 5

# Скорость движения очистки при использовании щетки
variable_brush_clean_speed        : 300

# Ускорение движения очистки при использовании щетки
variable_brush_clean_accel        : 10000

# Общая ширина щетки по оси X, в мм
variable_brush_width              : 42

# Общая глубина щетки по оси Y, в мм
variable_brush_depth              : 9

# True - сначала очистка по оси Y, затем по оси X. False - только по оси X
variable_y_brush                  : False

# Количество движений щетки
variable_brush_count              : 4


# [gcode_macro _DEF_PARK_VARS]
# description: Настройки переменных для макроса парковки
# gcode: # Оставить пустым

# # Высота Z для парковки, мм
# variable_park_z                   : 1

# # Высота Z-Hop перед перемещением по X и Y       
# variable_z_hop                    : 0.4        



[gcode_macro DEF_CLEAN]
description: Выполняет последовательность очистки, включая Poop, Brush и Kick
gcode:
    DEF_POOP
    G90
    DEF_BRUSH
    DEF_KICK

[gcode_macro DEF_POOP]
description: Процесс очистки сопла для удаления лишнего материала
variable_max_iteration_length: 40
variable_iteration_z_raise: 6
variable_iteration_z_change: 0.6
variable_max_iterations_per_blob: 3
variable_pressure_release_time: 1000
variable_purge_z: 0

gcode:
  {% set gVars = printer['gcode_macro _DEF_GLOBAL_VARS'] %}
  {% set travel_speed = gVars['travel_speed'] * 60|float %}
  {% set z_travel_speed = gVars['z_travel_speed'] * 60|float %}
  {% set verbose = gVars['verbose']|int %}
  {% set vars = printer['gcode_macro _DEF_POOP_VARS'] %}
  {% set purge_x, purge_y = vars.purge_loc_xy|map('float') %}
  {% set purge_spd = vars['purge_spd'] * 60|float %}
  {% set fast_z = vars['fast_z'] * 60|float %}
  {% set z_lift = vars['z_lift']|float %}
  {% set part_cooling_fan = vars['part_cooling_fan']|default(true)|lower == 'true' %}
  {% set part_cooling_fan_speed = vars['part_cooling_fan_speed']|default(1.0)|float %}
  {% set purge_cool_time = vars['purge_cool_time'] * 1000|float %}
  {% set purge_length = vars['purge_length']|float %}
  {% set purge_length_minimum = vars['purge_length_minimum']|float %}
  {% set purge_start = vars['purge_start']|float %}
  {% set restore_position = vars['restore_position']|default(true)|lower == 'true' %}

  {% if verbose > 0 %}
    RESPOND TYPE=command MSG='DEF_Poop: Начало процесса очистки'
  {% endif %}

  SAVE_GCODE_STATE NAME=_DEF_POOPING

  {% if part_cooling_fan %}
    {% if verbose > 1 %}
      RESPOND TYPE=command MSG='DEF_Poop: Включение вентилятора на полную мощность'
    {% endif %}
    {% set backup_fan_speed = printer.fan.speed %}
    M106 S{(part_cooling_fan_speed * 255)|int}
  {% endif %}
  
  {% set backup_feedrate = printer.gcode_move.speed_factor %}
  M220 S100
    
  {% if params.PURGE_LENGTH %}
    {% set purge_len = params.PURGE_LENGTH|float %}
  {% else %} 
    {% set purge_len = purge_length %}
  {% endif %}
    
  # Применяем минимальную длину очистки
  {% set purge_len = [purge_len, purge_length_minimum]|max %}
  G90

  {% if verbose > 1 %}
    RESPOND TYPE=command MSG='DEF_Poop: Перемещение к точке очистки'
  {% endif %}
  
  G1 X{purge_x} Y{purge_y} F{travel_speed}
  G1 Z{purge_z + purge_start} F{z_travel_speed}
    
  {% set iterations = (purge_len / max_iteration_length)|round(0, 'ceil')|int %}

  # Повторяем процесс до достижения заданной длины очистки
  {% for n in range(iterations) %}
    {% if verbose > 1 %}
      RESPOND TYPE=command MSG='DEF_Poop: Итерация очистки {n}'
    {% endif %}

    # Рассчитываем текущую итерацию в текущем блобе
    {% set step = n % max_iterations_per_blob %}
    {% if step == 0 %}
      G1 Z{purge_z + purge_start} F{z_travel_speed}
    {% endif %}

    {% set purge_amount_left = purge_len - (max_iteration_length * n) %}
    {% set extrude_amount = [purge_amount_left, max_iteration_length]|min %}
    {% set extrude_ratio = extrude_amount / max_iteration_length %}

    G91 
    M83

    {% set step_triangular = step * (step + 1) / 2 %}
    {% set z_raise_substract = purge_start if step == 0 else step_triangular * iteration_z_change %}
    {% set raise_z = (iteration_z_raise - z_raise_substract) * extrude_ratio %}
    {% set raise_z = [raise_z, 0]|max %}

    {% set duration = extrude_amount / purge_spd %} 
    {% set speed = raise_z / duration %}

    G1 Z{raise_z} E{extrude_amount} F{speed}

    {% set max_iterations_reached = step == max_iterations_per_blob - 1 %}
    {% set purge_length_reached = purge_len - max_iteration_length * (n + 1) <= 0 %}
    {% if max_iterations_reached or purge_length_reached %}
      RESPOND TYPE=command MSG='DEF_Poop: Быстрый подъем Z для предотвращения прилипания материала'
      G1 Z{z_lift} F{fast_z}
    {% endif %}
  {% endfor %}

  {% if verbose > 1 %}
    RESPOND TYPE=command MSG='DEF_Poop: Восстановление скорости вентилятора и коэффициента подачи'
  {% endif %}
  {% if part_cooling_fan %}
    M106 S{(backup_fan_speed * 255)|int}
  {% endif %}
  M220 S{(backup_feedrate * 100)|int} 

  RESTORE_GCODE_STATE NAME=_DEF_POOPING MOVE={1 if restore_position else 0}


[gcode_macro DEF_KICK]
description: Процесс толчка филамента для его освобождения
gcode:
  {% set gVars = printer['gcode_macro _DEF_GLOBAL_VARS'] %}
  {% set accel = gVars['accel']|float %}
  {% set travel_speed = gVars['travel_speed'] * 60|float %}
  {% set z_travel_speed = gVars['z_travel_speed'] * 60|float %}
  {% set verbose = gVars['verbose']|int %}
  {% set vars = printer['gcode_macro _DEF_KICK_VARS'] %}
  {% set kick_start_x, kick_start_y, kick_start_z = vars.kick_start_loc|map('float') %}
  {% set kick_z = vars['kick_z']|float %}
  {% set kick_direction = vars['kick_direction']|default('')|lower %}
  {% set kick_move_dist = vars['kick_move_dist']|float %}
  {% set z_after_kick = vars['z_after_kick']|float %}
  {% set kick_speed = vars['kick_speed'] * 60|float %}
  {% set kick_accel = vars['kick_accel']|float %}

  # Получаем границы принтера, чтобы убедиться, что движения не выходят за их пределы
  {% set x_max = printer.toolhead.axis_maximum.x %}
  {% set x_min = printer.toolhead.axis_minimum.x %}
  {% set y_max = printer.toolhead.axis_maximum.y %}
  {% set y_min = printer.toolhead.axis_minimum.y %}

  # Сохраняем текущее ускорение
  {% set saved_accel = printer.toolhead.max_accel %}

  # Проверяем, определено ли ускорение для макроса
  {% if kick_accel > 0 %}
    {% set selected_accel = kick_accel %}
  {% else %}
    {% set selected_accel = accel %}
  {% endif %}

  SET_VELOCITY_LIMIT ACCEL={selected_accel}
 
  {% if verbose > 0 %}
    RESPOND TYPE=command MSG='DEF_Kick: Начало толчка филамента'
  {% endif %}

  {% if verbose > 1 %}
    RESPOND TYPE=command MSG='DEF_Kick: Перемещение в начальную позицию'
  {% endif %}
  G1 Z{kick_start_z} F{z_travel_speed}
  G1 X{kick_start_x} Y{kick_start_y} F{travel_speed}

  {% if verbose > 1 %}
    RESPOND TYPE=command MSG='DEF_Kick: Опускание Z для выполнения толчка'
  {% endif %}
  {% if kick_z > 0 %}
    G1 Z{kick_z} F{z_travel_speed}
  {% else %}
    RESPOND TYPE=command MSG='DEF_KICK: Значение kick_z слишком низкое. Пожалуйста, отрегулируйте в файле DEF_Macro_Vars.cfg. Установлено значение 0.5 мм высоты Z'
    G1 Z0.5 F{z_travel_speed}
  {% endif %}

  {% set location_factor = {
        'left'  : { 'x': -1, 'y':  0 },
        'right' : { 'x':  1, 'y':  0 },
        'front' : { 'x':  0, 'y': -1 },
        'back'  : { 'x':  0, 'y':  1 }
    } %}

  {% if verbose > 1 %}
    RESPOND TYPE=command MSG='DEF_Kick: Выполнение толчка филамента'
  {% endif %}
  {% if kick_direction == "left" or kick_direction == "right" %}
    {% if (kick_start_x + location_factor[kick_direction].x * kick_move_dist) > x_max or (kick_start_x + location_factor[kick_direction].x * kick_move_dist) < x_min %}
      { action_raise_error("Движение толчка по X выходит за границы принтера. Проверьте параметр kick_move_dist в файле 3DEF_Macro_Vars.cfg!") }
    {% else %}
      G1 X{kick_start_x + location_factor[kick_direction].x * kick_move_dist} F{kick_speed}
    {% endif %}
  {% elif kick_direction == "front" or kick_direction == "back" %}
    {% if (kick_start_y + location_factor[kick_direction].y * kick_move_dist) > y_max or (kick_start_y + location_factor[kick_direction].y * kick_move_dist) < y_min %}
      { action_raise_error("Движение толчка по Y выходит за границы принтера. Проверьте параметр kick_move_dist в файле 3DEF_Macro_Vars.cfg!") }
    {% else %}
      G1 Y{kick_start_y + location_factor[kick_direction].y * kick_move_dist} F{kick_speed}
    {% endif %}
  {% else %}
    { action_raise_error("Ошибка в направлении толчка. Проверьте параметры в файле DEF_Macro_Vars.cfg!") }
  {% endif %}
  
  G1 Z{z_after_kick} F{z_travel_speed}

  # Восстанавливаем прежнее значение ускорения
  SET_VELOCITY_LIMIT ACCEL={saved_accel}


[gcode_macro DEF_BRUSH]
description: Очищает сопло с помощью щетки
gcode:
    {% set gVars = printer['gcode_macro _DEF_GLOBAL_VARS'] %}
    {% set accel = gVars['accel']|float %}
    {% set travel_speed = gVars['travel_speed'] * 60|float %}
    {% set z_travel_speed = gVars['z_travel_speed'] * 60|float %}
    {% set verbose = gVars['verbose']|int %}
    {% set vars = printer['gcode_macro _DEF_BRUSH_VARS'] %}
    {% set Bx, By, Bz = vars.brush_loc|map('float') %}
    {% set brush_clean_accel = vars['brush_clean_accel']|float %}
    {% set y_brush = vars['y_brush']|default(false)|lower == 'true' %}
    {% set brush_clean_speed = vars['brush_clean_speed'] * 60|float %}
    {% set brush_width = vars['brush_width']|float %}
    {% set brush_depth = vars['brush_depth']|float %}
    {% set brush_count = vars['brush_count']|int %}

    # Получаем границы принтера, чтобы убедиться, что движения не выходят за их пределы
    {% set x_max = printer.toolhead.axis_maximum.x %}
    {% set x_min = printer.toolhead.axis_minimum.x %}
    {% set y_max = printer.toolhead.axis_maximum.y %}
    {% set y_min = printer.toolhead.axis_minimum.y %}

    # Получаем минимальные и максимальные позиции для движений щетки
    {% set brush_x_max = Bx + brush_width / 2 %}
    {% set brush_x_min = Bx - brush_width / 2 %}
    {% set brush_y_max = By + brush_depth / 2 %}
    {% set brush_y_min = By - brush_depth / 2 %}

    # Устанавливаем ускорение очистки перед началом движения
    {% set saved_accel = printer.toolhead.max_accel %}

    # Проверяем, определено ли ускорение для макроса
    {% if brush_clean_accel > 0 %}
        {% set selected_accel = brush_clean_accel %}
    {% else %}
        {% set selected_accel = accel %}
    {% endif %}
    
    SET_VELOCITY_LIMIT ACCEL={selected_accel}

    {% if verbose > 0 %}
      RESPOND TYPE=command MSG='DEF_Brush: Очистка сопла'
    {% endif %}

    # Перемещаемся в центр щетки
    {% if verbose > 1 %}
      RESPOND TYPE=command MSG='DEF_Brush: Перемещение к щетке.'
    {% endif %}
     
    G1 X{Bx} Y{By} F{travel_speed}

    {% if Bz >= 0 %}
      G1 Z{Bz} F{z_travel_speed}
    {% endif %}
    
    # Процесс очистки
    {% if y_brush %}
        {% if verbose > 1 %}
          RESPOND TYPE=command MSG='DEF_Brush: Движения по оси Y'
        {% endif %}
        {% for wipe in range(brush_count) %}
        
            {% if brush_y_min >= y_min %}
                G1 Y{brush_y_min} F{brush_clean_speed}
            {% endif %}
            
            {% if brush_y_max <= y_max %}
                G1 Y{brush_y_max} F{brush_clean_speed}
            {% endif %}
        {% endfor %}
    {% else %}
        {% if verbose > 1 %}
          RESPOND TYPE=command MSG='DEF_Brush: Движения по оси X'
        {% endif %}
        {% for wipe in range(brush_count) %}
        
            {% if brush_x_min >= x_min %}
                G1 X{brush_x_min} F{brush_clean_speed}
            {% endif %}
            
            {% if brush_x_max <= x_max %}
                G1 X{brush_x_max} F{brush_clean_speed}
            {% endif %}
        {% endfor %}
    {% endif %}

    # Восстанавливаем прежнее значение ускорения
    SET_VELOCITY_LIMIT ACCEL={saved_accel}


#--=================================================================================--#
######### Макрос "Парковка" (Park) ########################################################################
#--=================================================================================--#

[gcode_macro DEF_PARK]
description: Уводит сопло в парковочную позицию

gcode:
    {% set gVars = printer['gcode_macro _DEF_GLOBAL_VARS'] %}
    {% set travel_speed = gVars['travel_speed'] * 60|float %}  # Скорость перемещения по осям X и Y
    {% set z_travel_speed = gVars['z_travel_speed'] * 60|float %}  # Скорость перемещения по оси Z
    {% set verbose = gVars['verbose']|int %}  # Уровень детализации вывода сообщений
    {% set vars = printer['gcode_macro _DEF_POOP_VARS'] %}  # Получаем переменные из секции очистки
    {% set park_x, park_y = vars.purge_loc_xy|map('float') %}  # Координаты парковочной точки (X, Y)
    # {% set park_z = vars['park_z']|float %}.  # Высота парковки по Z из глобальных переменных
    {% set park_z = gVars['park_z']|float %}  # Высота парковки по Z из глобальных переменных
    # {% set z_hop = vars['z_hop']|float %}  # Высота Z-Hop перед перемещением по X и Y
    {% set z_hop = gVars['z_hop']|float %}  # Высота Z-Hop перед перемещением по X и Y

    # Сохраняем текущее состояние перед перемещением
    SAVE_GCODE_STATE NAME=_DEF_PARKING

    {% if verbose > 0 %}
        RESPOND TYPE=command MSG='DEF_PARK: Начало процесса парковки'
    {% endif %}

    # Шаг 1: Поднятие головы на высоту Z-Hop
    G90  ; Абсолютный режим координат
    G1 Z{printer.toolhead.position.z + z_hop} F{z_travel_speed}  ; Поднимаем голову на высоту Z-Hop

    {% if verbose > 1 %}
        RESPOND TYPE=command MSG='DEF_PARK: Голова поднята на {z_hop} мм'
    {% endif %}

    # Шаг 2: Перемещение к парковочной точке по X и Y
    G1 X{park_x} Y{park_y} F{travel_speed}  ; Перемещаем сопло в парковочную позицию по X и Y

    {% if verbose > 1 %}
        RESPOND TYPE=command MSG='DEF_PARK: Перемещение к парковочной позиции X:{park_x}, Y:{park_y}'
    {% endif %}

    # Шаг 3: Опускание головы до безопасной высоты по Z
    G1 Z{park_z} F{z_travel_speed}  ; Опускаем голову до заданной высоты парковки

    {% if verbose > 1 %}
        RESPOND TYPE=command MSG='DEF_PARK: Голова опущена до Z:{park_z}'
    {% endif %}

    {% if verbose > 0 %}
        RESPOND TYPE=command MSG='DEF_PARK: Процесс парковки завершен'
    {% endif %}