#--------------------------------------------------------------------
##	Двигатель Z3
[stepper_z3]
step_pin: PE2                       # Step GPIO pin (высокий уровень срабатывания). Этот параметр обязателен.
dir_pin:  !PF10                      # Направление вращения двигателя. Этот параметр обязателен.
enable_pin: !PC0                    # PIN Включение двигателя.
