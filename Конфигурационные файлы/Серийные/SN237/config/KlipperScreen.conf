[include mmu_klipperscreen.conf]

[preheat ABS]
bed = 100
extruder = 255

[preheat PLA]
bed = 50
extruder = 220

[preheat PETG]
bed = 80
extruder = 245

[preheat ASA]
bed = 100
extruder = 255

[menu __main my_shutdown]
name: Выкл.
icon: shutdown
method: printer.gcode.script
params: {"script":"SHUT_DOWN"}
confirm: Вы уверенны?

